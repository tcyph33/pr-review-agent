<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>PR Review Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef0f6;
      --panel: #ffffff;
      --panel-2: #f5f6fa;
      --line: #e6e8f0;
      --line-soft: #eef0f5;
      --accent: #6366f1;
      --accent-deep: #4f52d9;
      --accent-tint: #eef0fe;
      --ink: #1f2333;
      --ink-mute: #6b7088;
      --ink-faint: #9aa0b5;
      --good: #16a34a;
      --good-tint: #e8f7ee;
      --warn: #d97706;
      --warn-tint: #fdf3e3;
      --bad: #dc2626;
      --bad-tint: #fdeaea;
      --ink-body: #434965;
      --code-bg: #f7f8fb;
      --bad-border: #f3c6c6;
      --warn-border: #f0d9b5;
      --accent-border: #d8daf8;
      --accent-tint-hover: #e2e4fd;
      --bad-tint-hover: #fbdcdc;
      --overlay: rgba(31, 35, 51, 0.45);
      --mono: "SF Mono", "JetBrains Mono", "Fira Code", monospace;
      --shadow: 0 1px 2px rgba(31, 35, 51, 0.05), 0 8px 24px rgba(31, 35, 51, 0.07);
      --shadow-lift: 0 2px 4px rgba(31, 35, 51, 0.06), 0 14px 36px rgba(31, 35, 51, 0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 28px 28px 48px;
    }

    header {
      background: var(--accent);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 28px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .eyebrow {
      font-size: 0.64rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      line-height: 1.15;
    }

    h1 .accent { color: rgba(255, 255, 255, 0.65); font-weight: 500; }

    .meta { font-size: 0.72rem; color: rgba(255, 255, 255, 0.65); margin-top: 10px; font-family: var(--mono); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 16px;
      transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary   { background: #ffffff; color: var(--accent-deep); }
    .btn-primary:hover { background: var(--accent-tint-hover); }
    .btn-danger    { background: rgba(255,255,255,0.12); color: #ffffff; border: 1px solid rgba(255,255,255,0.35); }
    .btn-danger:hover { background: rgba(255,255,255,0.22); }
    .btn-ghost     { background: var(--panel); color: var(--ink-mute); border: 1px solid var(--line); font-size: 0.72rem; padding: 6px 12px; }
    .btn-ghost:hover { color: var(--accent-deep); border-color: var(--accent); }
    .btn-claude    { background: var(--accent-tint); color: var(--accent-deep); border: 1px solid var(--accent-border); font-size: 0.7rem; padding: 4px 10px; }
    .btn-claude:hover { background: var(--accent-tint-hover); }
    .btn-log       { background: var(--panel); color: var(--ink-mute); border: 1px solid var(--line); font-size: 0.7rem; padding: 4px 10px; }
    .btn-log:hover { color: var(--warn); border-color: var(--warn-border); background: var(--warn-tint); }

    .controls-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls-bar select {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink-mute);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
      font-family: inherit;
      box-shadow: 0 1px 2px rgba(31,35,51,0.04);
    }

    .controls-bar select:hover { border-color: var(--accent); color: var(--ink); }

    .controls-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-faint);
      white-space: nowrap;
    }

    .controls-divider { width: 1px; height: 20px; background: var(--line); margin: 0 4px; }

    .settings-wrap { position: relative; margin-left: auto; }

    .settings-gear {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink-mute);
      padding: 6px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 2px rgba(31,35,51,0.04);
      transition: color 0.15s, border-color 0.15s, transform 0.25s ease;
    }

    .settings-gear:hover { color: var(--accent-deep); border-color: var(--accent); }
    .settings-gear.open { color: var(--accent-deep); border-color: var(--accent); transform: rotate(60deg); }

    .settings-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      width: 240px;
      background: var(--panel);
      border-radius: 12px;
      box-shadow: var(--shadow-lift);
      padding: 14px 16px;
      z-index: 50;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
    }

    .settings-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }

    .settings-dropdown::before {
      content: "";
      position: absolute;
      top: -5px;
      right: 12px;
      width: 10px;
      height: 10px;
      background: var(--panel);
      transform: rotate(45deg);
      border-radius: 2px;
    }

    .settings-title {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .settings-label { font-size: 0.8rem; font-weight: 500; color: var(--ink); }

    .settings-row select {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 5px 8px;
      cursor: pointer;
      outline: none;
      font-family: inherit;
    }

    .settings-row select:hover { border-color: var(--accent); }

    .pr-number { display: none; }

    .summary-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--panel);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 18px 26px;
      min-width: 150px;
      flex: 1;
    }

    .stat-value { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
    .stat-label { font-size: 0.6rem; color: var(--ink-faint); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.16em; font-weight: 700; }
    .stat-warn .stat-value { color: var(--warn); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 520px) { .cards { grid-template-columns: 1fr; } }

    .card {
      background: var(--panel);
      border: 1px solid transparent;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, border-color 0.15s, opacity 0.3s, transform 0.2s;
    }

    .card:hover { box-shadow: var(--shadow-lift); }
    .card.removing { opacity: 0; transform: scale(0.98); transition: opacity 0.2s, transform 0.2s; }
    .card-failed { border-color: var(--bad-border) !important; }
    .card-merged { opacity: 0.6; }
    .card-closed { opacity: 0.6; }

    .ghost-number {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
      opacity: 0.7;
      user-select: none;
      font-family: var(--mono);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 22px 24px 16px;
      gap: 14px;
      position: relative;
    }

    .card-title-wrap { min-width: 0; flex: 1; padding-right: 40px; }
    .verdict-slot { flex-shrink: 0; margin-top: 2px; padding-right: 56px; }

    .card-title { font-size: 1.02rem; font-weight: 650; color: var(--ink); text-decoration: none; line-height: 1.4; letter-spacing: -0.01em; }
    .card-title:hover { color: var(--accent-deep); }
    .card-title-failed { color: var(--bad); }

    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }

    .badge {
      font-size: 0.66rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--panel-2);
      color: var(--ink-mute);
      display: inline-flex;
      align-items: center;
    }

    .badge-failed { background: var(--bad-tint); color: var(--bad); }
    .badge-waiting-medium { background: var(--warn-tint); color: var(--warn); }
    .badge-waiting-high { background: var(--bad-tint); color: var(--bad); }
    .badge-commits { background: var(--accent-tint); color: var(--accent-deep); cursor: pointer; }
    .badge-commits:hover { background: var(--accent-tint-hover); }
    .badge-state-pending { background: var(--panel-2); color: var(--ink-mute); }
    .badge-state-commented { background: var(--accent-tint); color: var(--accent-deep); }
    .badge-state-changes { background: var(--warn-tint); color: var(--warn); }
    .badge-state-approved { background: var(--good-tint); color: var(--good); }
    .badge-status-open { display: none; }
    .badge-status-merged { background: var(--accent-tint); color: var(--accent-deep); }
    .badge-status-closed { background: var(--panel-2); color: var(--ink-faint); }

    .meta-line {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-faint);
      margin-top: 8px;
      word-break: break-word;
    }

    .diff-add { color: var(--good); }
    .diff-del { color: var(--bad); }

    .title-arrow {
      font-size: 0.8em;
      color: var(--ink-faint);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card:hover .title-arrow { opacity: 1; }

    .card-top-right {
      position: absolute;
      top: 14px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
    }

    .card-x {
      background: transparent;
      border: none;
      color: var(--ink-faint);
      font-size: 0.85rem;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }

    .card:hover .card-x { opacity: 1; }
    .card-x:hover { color: var(--bad); background: var(--bad-tint); }

    .card-body { border-top: 1px solid var(--line-soft); padding: 16px 24px; }

    .failed-message { font-size: 0.85rem; color: var(--ink-mute); font-style: italic; }

    .feedback-preview { cursor: pointer; }
    .feedback-preview:hover .feedback-click-hint { color: var(--accent-deep); }

    .feedback-section { margin-bottom: 12px; }
    .feedback-section-body {
      font-size: 0.85rem;
      line-height: 1.65;
      color: var(--ink-body);
      word-break: break-word;
    }

    .feedback-section-body p { margin: 0 0 6px; }
    .feedback-section-body p:last-child { margin-bottom: 0; }
    .feedback-section-body strong { color: var(--ink); font-weight: 650; }
    .feedback-section-body em { font-style: italic; }
    .feedback-section-body code { background: var(--panel-2); color: var(--accent-deep); padding: 1px 5px; border-radius: 4px; font-family: var(--mono); font-size: 0.76rem; }
    .feedback-section-body ul, .feedback-section-body ol { padding-left: 20px; margin: 4px 0; }
    .feedback-section-body li { margin: 3px 0; }

    .verdict-chip {
      display: inline-flex;
      align-items: center;
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--panel-2);
      flex-shrink: 0;
    }

    .verdict-approve { background: var(--good-tint); color: var(--good); }
    .verdict-changes { background: var(--warn-tint); color: var(--warn); }
    .verdict-reject { background: var(--bad-tint); color: var(--bad); }
    .verdict-neutral { color: var(--ink-mute); }

    .read-more {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-faint);
      cursor: pointer;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .read-more:hover { color: var(--accent-deep); }

    /* Commit modal */
    .commits-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .commits-modal-overlay.visible { display: flex; }

    .commits-modal {
      background: var(--panel);
      border-radius: 16px;
      box-shadow: var(--shadow-lift);
      width: 100%;
      max-width: 540px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
    }

    .commits-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line-soft);
      flex-shrink: 0;
    }

    .commits-modal-title { font-size: 0.88rem; font-weight: 650; color: var(--ink); }
    .commits-modal-close { background: transparent; border: none; color: var(--ink-faint); font-size: 1.2rem; cursor: pointer; padding: 0 4px; line-height: 1; }
    .commits-modal-close:hover { color: var(--ink); }

    .commits-modal-body { overflow-y: auto; flex: 1; padding: 8px 0; }

    .commit-item {
      padding: 8px 20px;
      font-size: 0.78rem;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .commit-item:hover { background: var(--panel-2); }
    .commit-sha    { color: var(--accent-deep); font-family: var(--mono); flex-shrink: 0; }
    .commit-msg    { color: var(--ink-body); flex: 1; word-break: break-word; }
    .commit-author { color: var(--ink-faint); font-size: 0.7rem; flex-shrink: 0; }

    .commits-modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--line-soft);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Full review modal markdown */
    .review-md { font-size: 0.86rem; line-height: 1.7; color: var(--ink-body); }
    .review-md h1 { font-size: 1rem; font-weight: 700; color: var(--ink); margin: 16px 0 6px; letter-spacing: -0.01em; }
    .review-md h2 { font-size: 0.74rem; font-weight: 700; color: var(--accent-deep); margin: 18px 0 6px; text-transform: uppercase; letter-spacing: 0.14em; }
    .review-md h3 { font-size: 0.85rem; font-weight: 650; color: var(--ink); margin: 12px 0 4px; }
    .review-md strong { color: var(--ink); font-weight: 650; }
    .review-md em { font-style: italic; }
    .review-md code { background: var(--panel-2); color: var(--accent-deep); padding: 1px 5px; border-radius: 4px; font-family: var(--mono); font-size: 0.76rem; }
    .review-md pre { background: var(--code-bg); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin: 8px 0; overflow-x: auto; }
    .review-md pre code { background: transparent; color: var(--ink-body); padding: 0; font-size: 0.74rem; }
    .review-md ul, .review-md ol { padding-left: 20px; margin: 6px 0; }
    .review-md li { margin: 3px 0; }
    .review-md hr { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
    .review-md p { margin: 6px 0; }
    .review-md table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 0.78rem; }
    .review-md th { background: var(--panel-2); color: var(--ink); padding: 6px 10px; text-align: left; border: 1px solid var(--line); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .review-md td { padding: 5px 10px; border: 1px solid var(--line); color: var(--ink-body); }
    .review-md tr:nth-child(even) td { background: var(--code-bg); }

    .card-footer { padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; gap: 8px; border-top: 1px solid var(--line-soft); }
    .footer-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .empty { text-align: center; padding: 80px 24px; color: var(--ink-mute); grid-column: 1 / -1; }
    .empty h2 { font-size: 1.1rem; margin-bottom: 8px; color: var(--ink); }
    .empty p  { font-size: 0.85rem; }
    .empty code { background: var(--panel-2); color: var(--accent-deep); padding: 1px 6px; border-radius: 4px; font-family: var(--mono); font-size: 0.8rem; }

    .error-banner {
      background: var(--bad-tint);
      border: 1px solid var(--bad-border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--bad);
      font-size: 0.85rem;
      margin-bottom: 24px;
      display: none;
    }

    .confirm-banner {
      background: var(--panel);
      border-radius: 12px;
      border-left: 3px solid var(--bad);
      box-shadow: var(--shadow);
      padding: 14px 18px;
      font-size: 0.85rem;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .confirm-banner.visible { display: flex; }
    .confirm-banner span { color: var(--ink-body); }
    .confirm-banner .confirm-actions { display: flex; gap: 8px; }
    .confirm-banner .btn-danger { background: var(--bad-tint); color: var(--bad); border: 1px solid var(--bad-border); }
    .confirm-banner .btn-danger:hover { background: var(--bad-tint-hover); }

    /* ── Log + review modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--panel);
      border-radius: 16px;
      box-shadow: var(--shadow-lift);
      width: 100%;
      max-width: 860px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line-soft);
    }

    .modal-title { font-size: 0.92rem; font-weight: 650; color: var(--ink); letter-spacing: -0.01em; }
    .modal-close { background: transparent; border: none; color: var(--ink-faint); font-size: 1.2rem; cursor: pointer; padding: 0 4px; }
    .modal-close:hover { color: var(--ink); }

    .modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }

    .log-content {
      font-family: var(--mono);
      font-size: 0.76rem;
      line-height: 1.6;
      color: var(--ink-body);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-loading { color: var(--ink-mute); font-style: italic; font-size: 0.85rem; }

    /* Dark theme: applies when system prefers dark (unless pinned to light),
       or when explicitly pinned to dark via the header toggle. */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0e0e14;
        --panel: #15151e;
        --panel-2: #1e1e2a;
        --line: #26263a;
        --line-soft: #1e1e2e;
        --accent: #5558e6;
        --accent-deep: #9a9aff;
        --accent-tint: #1e1e36;
        --ink: #e9e9f2;
        --ink-mute: #9494ab;
        --ink-faint: #62627a;
        --good: #4ade80;
        --good-tint: #142a1c;
        --warn: #fbbf24;
        --warn-tint: #2a2210;
        --bad: #f87171;
        --bad-tint: #2c1518;
        --ink-body: #c2c2d4;
        --code-bg: #101018;
        --bad-border: #4a2430;
        --warn-border: #4a3a1a;
        --accent-border: #3a3a6e;
        --accent-tint-hover: #26264a;
        --bad-tint-hover: #3a1a22;
        --overlay: rgba(6, 6, 12, 0.7);
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.35);
        --shadow-lift: 0 2px 4px rgba(0, 0, 0, 0.35), 0 14px 36px rgba(0, 0, 0, 0.5);
      }

      :root:not([data-theme="light"]) .btn-primary { background: #ffffff; color: #4f52d9; }
      :root:not([data-theme="light"]) .btn-primary:hover { background: #e2e4fd; }
    }

    :root[data-theme="dark"] {
        --bg: #0e0e14;
        --panel: #15151e;
        --panel-2: #1e1e2a;
        --line: #26263a;
        --line-soft: #1e1e2e;
        --accent: #5558e6;
        --accent-deep: #9a9aff;
        --accent-tint: #1e1e36;
        --ink: #e9e9f2;
        --ink-mute: #9494ab;
        --ink-faint: #62627a;
        --good: #4ade80;
        --good-tint: #142a1c;
        --warn: #fbbf24;
        --warn-tint: #2a2210;
        --bad: #f87171;
        --bad-tint: #2c1518;
        --ink-body: #c2c2d4;
        --code-bg: #101018;
        --bad-border: #4a2430;
        --warn-border: #4a3a1a;
        --accent-border: #3a3a6e;
        --accent-tint-hover: #26264a;
        --bad-tint-hover: #3a1a22;
        --overlay: rgba(6, 6, 12, 0.7);
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.35);
        --shadow-lift: 0 2px 4px rgba(0, 0, 0, 0.35), 0 14px 36px rgba(0, 0, 0, 0.5);
    }

    :root[data-theme="dark"] .btn-primary { background: #ffffff; color: #4f52d9; }
    :root[data-theme="dark"] .btn-primary:hover { background: #e2e4fd; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="eyebrow">Automated Agent · Pull Requests</div>
    <h1>Code reviews, <span class="accent">handled.</span></h1>
    <div class="meta" id="refreshed-at"></div>
  </div>
  <div class="actions">
    <button class="btn-danger" id="btn-clear-all" onclick="confirmClearAll()" style="display:none">Clear All</button>
    <button class="btn-primary" id="btn-open-all" onclick="openAll()" style="display:none">Open All</button>
  </div>
</header>

<div class="error-banner" id="error-banner"></div>

<div class="confirm-banner" id="confirm-banner">
  <span>Remove all reviews? This cannot be undone.</span>
  <div class="confirm-actions">
    <button class="btn-ghost" onclick="cancelClearAll()">Cancel</button>
    <button class="btn-danger" onclick="clearAll()">Yes, clear all</button>
  </div>
</div>

<div id="loading-screen" style="text-align:center;padding:80px 24px;color:#8b949e;">
  <div style="font-size:1.1rem;color:#c9d1d9;margin-bottom:8px;">Loading reviews...</div>
  <div style="font-size:0.85rem;">Fetching latest status from GitHub</div>
</div>
<div class="summary-bar" id="summary-bar" style="display:none"></div>

<div class="controls-bar" id="controls-bar" style="display:none">
  <span class="controls-label">Sort:</span>
  <select id="sort-select" onchange="applyControls()">
    <option value="reviewed-desc">Recently reviewed</option>
    <option value="age-desc">Oldest PR first</option>
    <option value="age-asc">Newest PR first</option>
    <option value="repo-asc">Repo (A–Z)</option>
    <option value="waiting-desc">Waiting longest</option>
    <option value="waiting-asc">Waiting shortest</option>
  </select>
  <div class="controls-divider"></div>
  <span class="controls-label">Repo:</span>
  <select id="filter-repo" onchange="applyControls()">
    <option value="all">All repos</option>
  </select>
  <span class="controls-label">State:</span>
  <select id="filter-state" onchange="applyControls()">
    <option value="all">All states</option>
    <option value="PENDING">Pending</option>
    <option value="COMMENTED">Commented</option>
    <option value="CHANGES_REQUESTED">Changes requested</option>
    <option value="APPROVED">Approved</option>
  </select>
  <span class="controls-label">Status:</span>
  <select id="filter-status" onchange="applyControls()">
    <option value="all">All</option>
    <option value="open">Open</option>
    <option value="merged">Merged</option>
    <option value="closed">Closed</option>
  </select>
  <div class="settings-wrap">
    <button class="settings-gear" id="settings-gear" onclick="toggleSettings(event)" title="Settings" aria-label="Settings" aria-expanded="false">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
    <div class="settings-dropdown" id="settings-dropdown">
      <div class="settings-title">Settings</div>
      <div class="settings-row">
        <label class="settings-label" for="theme-select">Theme</label>
        <select id="theme-select" onchange="setTheme(this.value)">
          <option value="auto">Auto (system)</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="cards" id="cards" style="display:none"></div>

<!-- Log modal -->
<div class="modal-overlay" id="log-modal" onclick="closeLogModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="log-modal-title">Agent Log</div>
      <button class="modal-close" onclick="closeLogModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="log-content" id="log-content"></div>
    </div>
  </div>
</div>

<!-- Full review modal -->
<div class="modal-overlay" id="review-modal" onclick="closeReviewModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="review-modal-title">Full Review</div>
      <button class="modal-close" onclick="closeReviewModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="review-md" id="review-modal-content"></div>
    </div>
  </div>
</div>

<!-- Commits modal -->
<div class="commits-modal-overlay" id="commits-modal">
  <div class="commits-modal">
    <div class="commits-modal-header">
      <div class="commits-modal-title" id="commits-modal-title">New Commits</div>
      <button class="commits-modal-close" onclick="closeCommitsModal()">✕</button>
    </div>
    <div class="commits-modal-body" id="commits-modal-body"></div>
    <div class="commits-modal-footer">
      <button class="btn-ghost" onclick="closeCommitsModal()">Close</button>
      <button class="btn-secondary" id="commits-mark-seen-btn" onclick="markSeenFromModal()">Mark as seen</button>
    </div>
  </div>
</div>

<script>
  let reviews = [];

  // ── Theme: "auto" follows system; "light"/"dark" pin it ──
  function applyTheme(theme) {
    if (theme === "light" || theme === "dark") {
      document.documentElement.dataset.theme = theme;
    } else {
      delete document.documentElement.dataset.theme;
    }
    const select = document.getElementById("theme-select");
    if (select) select.value = theme;
  }

  function setTheme(theme) {
    if (theme === "auto") localStorage.removeItem("theme");
    else localStorage.setItem("theme", theme);
    applyTheme(theme);
  }

  applyTheme(localStorage.getItem("theme") || "auto");

  // ── Settings dropdown ──
  function toggleSettings(e) {
    e.stopPropagation();
    const dropdown = document.getElementById("settings-dropdown");
    const gear = document.getElementById("settings-gear");
    const open = dropdown.classList.toggle("open");
    gear.classList.toggle("open", open);
    gear.setAttribute("aria-expanded", String(open));
  }

  function closeSettings() {
    document.getElementById("settings-dropdown").classList.remove("open");
    const gear = document.getElementById("settings-gear");
    gear.classList.remove("open");
    gear.setAttribute("aria-expanded", "false");
  }

  document.addEventListener("click", (e) => {
    const wrap = e.target.closest(".settings-wrap");
    if (!wrap) closeSettings();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeSettings();
  });

  function timeAgo(isoString) {
    const diff = Date.now() - new Date(isoString).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1)  return "just now";
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function prAgeDays(r) {
    const created = r.prCreatedAt ? new Date(r.prCreatedAt) : new Date(r.reviewedAt);
    return Math.floor((Date.now() - created.getTime()) / 86400000);
  }

  function waitingDays(r) {
    if (!r.reviewRequestedAt) return null;
    return Math.floor((Date.now() - new Date(r.reviewRequestedAt).getTime()) / 86400000);
  }

  function renderSummary() {
    const bar      = document.getElementById("summary-bar");
    const open     = filteredReviews.filter(r => !r.prStatus || r.prStatus === "open");
    const approved = open.filter(r => r.reviewState === "APPROVED").length;
    const stale    = open.filter(r => { const wd = waitingDays(r); return wd !== null && wd >= 3; }).length;
    const rereview = open.filter(r => r.newCommits && r.newCommits.length > 0).length;
    const ages     = open.map(r => prAgeDays(r));
    const oldest   = ages.length ? Math.max(...ages) : 0;
    bar.innerHTML = `
      <div class="stat"><div class="stat-value">${open.length}</div><div class="stat-label">Open PRs</div></div>
      <div class="stat"><div class="stat-value">${approved}</div><div class="stat-label">Approved</div></div>
      <div class="stat ${stale > 0 ? 'stat-warn' : ''}"><div class="stat-value">${stale}</div><div class="stat-label">Waiting 3+ Days</div></div>
      <div class="stat ${rereview > 0 ? 'stat-warn' : ''}"><div class="stat-value">${rereview}</div><div class="stat-label">New Commits</div></div>
      <div class="stat ${oldest >= 7 ? 'stat-warn' : ''}"><div class="stat-value">${oldest === 1 ? '1 day' : oldest + ' days'}</div><div class="stat-label">Oldest PR</div></div>
    `;
  }

  let filteredReviews = [];

  function populateRepoFilter() {
    const select = document.getElementById("filter-repo");
    const current = select.value;
    const repos = [...new Set(reviews.map(r => r.repo))].sort();
    select.innerHTML = '<option value="all">All repos</option>' +
      repos.map(r => `<option value="${escHtml(r)}">${escHtml(r)}</option>`).join("");
    if (repos.includes(current)) select.value = current;
  }

  function applyControls() {
    const sort   = document.getElementById("sort-select").value;
    const repo   = document.getElementById("filter-repo").value;
    const state  = document.getElementById("filter-state").value;
    const status = document.getElementById("filter-status").value;

    filteredReviews = reviews
      .filter(r => repo   === "all" || r.repo        === repo)
      .filter(r => state  === "all" || (r.reviewState || "PENDING") === state)
      .filter(r => status === "all" || (r.prStatus    || "open")    === status);

    filteredReviews.sort((a, b) => {
      if (sort === "reviewed-desc") return new Date(b.reviewedAt).getTime() - new Date(a.reviewedAt).getTime();
      if (sort === "age-desc")      return prAgeDays(b) - prAgeDays(a);
      if (sort === "age-asc")       return prAgeDays(a) - prAgeDays(b);
      if (sort === "repo-asc")      return a.repo.localeCompare(b.repo);
      // Nulls sort last for waiting
      if (sort === "waiting-desc")  {
        if (!a.reviewRequestedAt && !b.reviewRequestedAt) return 0;
        if (!a.reviewRequestedAt) return 1;
        if (!b.reviewRequestedAt) return -1;
        return new Date(a.reviewRequestedAt).getTime() - new Date(b.reviewRequestedAt).getTime();
      }
      if (sort === "waiting-asc")   {
        if (!a.reviewRequestedAt && !b.reviewRequestedAt) return 0;
        if (!a.reviewRequestedAt) return 1;
        if (!b.reviewRequestedAt) return -1;
        return new Date(b.reviewRequestedAt).getTime() - new Date(a.reviewRequestedAt).getTime();
      }
      return 0;
    });

    renderCards();
    renderSummary();
  }

  function renderCards() {
    const container = document.getElementById("cards");
    const hasReviews = reviews.length > 0;

    document.getElementById("btn-open-all").style.display   = hasReviews ? "" : "none";
    document.getElementById("btn-clear-all").style.display  = hasReviews ? "" : "none";
    document.getElementById("controls-bar").style.display   = hasReviews ? "" : "none";

    if (!hasReviews) {
      container.innerHTML = `
        <div class="empty">
          <h2>No reviews yet</h2>
          <p>Run <code>npm run review</code> to fetch and review open PRs.</p>
        </div>`;
      return;
    }

    if (filteredReviews.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <h2>No matching reviews</h2>
          <p>Try adjusting the filters above.</p>
        </div>`;
      return;
    }

    container.innerHTML = filteredReviews.map((r, i) => {
      const failed = r.reviewStatus === "failed";
      const cardClass = [
        "card",
        failed ? "card-failed" : "",
        r.prStatus === "merged" ? "card-merged" : "",
        r.prStatus === "closed" ? "card-closed" : "",
      ].filter(Boolean).join(" ");

      const titleClass = failed ? "card-title card-title-failed" : "card-title";

      const metaLine = failed
        ? `${escHtml(r.repo)} · @${escHtml(r.author)} · reviewed ${timeAgo(r.reviewedAt)}`
        : `${escHtml(r.repo)} · @${escHtml(r.author)} · ${r.filesChanged} file${r.filesChanged !== 1 ? "s" : ""} · <span class="diff-add">+${r.additions}</span> <span class="diff-del">−${r.deletions}</span> · ${prAgeDays(r) === 1 ? '1 day old' : prAgeDays(r) + ' days old'}`;

      const statusPills = failed
        ? ``
        : `${reviewStateBadge(r.reviewState || "PENDING")}
           ${(() => {
             const wd = waitingDays(r);
             if (wd === null || wd < 3) return '';
             const cls = wd >= 5 ? 'badge-waiting-high' : 'badge-waiting-medium';
             return `<span class="badge ${cls}">Waiting ${wd} days</span>`;
           })()}
           ${(r.newCommits && r.newCommits.length > 0) ? `<span class="badge badge-commits" data-id="${escHtml(r.id)}" data-commits="${escHtml(JSON.stringify(r.newCommits || []))}" onclick="showCommitsFromBadge(this)">↑ ${r.newCommits.length} new commit${r.newCommits.length !== 1 ? 's' : ''}</span>` : ''}
           ${prStatusBadge(r.prStatus)}`;

      const verdictSlot = failed
        ? `<span class="badge badge-failed">Review Failed</span>`
        : verdictChipFromFeedback(r.feedback);

      const cardBody = failed
        ? `<div class="card-body">
             <p class="failed-message">The review agent failed for this PR. Check the log for details.</p>
           </div>`
        : `<div class="card-body feedback-preview" data-review-idx="${i}" onclick="openReviewModalByIdx(this)">
             ${renderFeedbackPreview(r.feedback)}
           </div>`;

      const cardFooter = `
        <div class="card-footer">
          <div class="footer-actions">
            ${!failed ? `<button class="btn-claude" data-id="${escHtml(r.id)}" onclick="openInClaude(this)">Claude Code</button>` : ""}
            ${r.logFile ? `<button class="btn-log" data-id="${escHtml(r.id)}" data-title="${escHtml(r.title)}" onclick="viewLog(this)">View Log</button>` : ""}
          </div>
          ${!failed ? `<span class="read-more" data-review-idx="${i}" onclick="openReviewModalByIdx(this)">Read full review →</span>` : ""}
        </div>`;

      return `
        <div class="${cardClass}" id="card-${i}">
          <div class="card-top-right">
            <span class="ghost-number">#${escHtml(String(r.pull_number))}</span>
            <button class="card-x" data-id="${escHtml(r.id)}" data-idx="${i}" onclick="dismissReview(this)" title="Dismiss" aria-label="Dismiss review">✕</button>
          </div>
          <div class="card-header">
            <div class="card-title-wrap">
              <a class="${titleClass}" href="${r.url}" target="_blank">${escHtml(r.title)} <span class="title-arrow">↗</span></a>
              <div class="meta-line">${metaLine}</div>
              ${failed ? "" : `<div class="card-meta">${statusPills}</div>`}
            </div>
            <div class="verdict-slot">${verdictSlot}</div>
          </div>
          ${cardBody}
          ${cardFooter}
        </div>
      `;
    }).join("");
  }

  function parseFeedbackSections(raw) {
    const sections = {};
    const lines = raw.split('\n');
    let currentSection = null;
    let currentContent = [];
    for (const line of lines) {
      const m = line.match(/^#{1,3}\s+(.+)$/);
      if (m) {
        if (currentSection) sections[currentSection.toLowerCase()] = currentContent.join('\n').trim();
        currentSection = m[1].trim();
        currentContent = [];
      } else if (currentSection) {
        currentContent.push(line);
      }
    }
    if (currentSection) sections[currentSection.toLowerCase()] = currentContent.join('\n').trim();
    return sections;
  }

  function verdictChip(text) {
    if (!text) return '';
    const t = text.toLowerCase();
    let cls = 'verdict-neutral';
    if (/approve|lgtm|looks good/i.test(t)) cls = 'verdict-approve';
    else if (/change|request|revise|update/i.test(t)) cls = 'verdict-changes';
    else if (/reject|block|deny/i.test(t)) cls = 'verdict-reject';
    return `<span class="verdict-chip ${cls}">${escHtml(text.split('\n')[0].trim())}</span>`;
  }

  function verdictChipFromFeedback(raw) {
    const sections = parseFeedbackSections(raw);
    const verdict = sections['verdict'] || sections['decision'] || sections['recommendation'] || '';
    return verdictChip(verdict);
  }

  function renderFeedbackPreview(raw) {
    const sections = parseFeedbackSections(raw);
    const summary = sections['summary'] || sections['overview'] || sections['tldr'] || sections['tl;dr']
      || raw.split(/\n\n/)[0].trim().slice(0, 300);
    return `<div class="feedback-section-body">${renderInlineMarkdown(summary)}</div>`;
  }

  function renderInlineMarkdown(raw) {
    const cleaned = String(raw).replace(/^---+$/gm, '');
    const escaped = cleaned.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return escaped
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/((?:^[ \t]*[-*] .+\n?)+)/gm, (block) => {
        const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*] /, '')}</li>`).join('');
        return `<ul>${items}</ul>`;
      })
      .replace(/\n\n+/g, '</p><p>')
      .replace(/^(?!<[a-z])(.+)$/gm, line => line)
      .replace(/^(?!<(?:ul|ol|li|pre|p))(.+)$/gm, '<p>$1</p>');
  }

  function openReviewModalByIdx(el) {
    const idx = parseInt(el.getAttribute('data-review-idx'), 10);
    const r = filteredReviews[idx];
    if (!r) return;
    openReviewModal(r.title, r.feedback);
  }

  function openReviewModal(title, feedback) {
    document.getElementById('review-modal-title').textContent = title;
    document.getElementById('review-modal-content').innerHTML = renderMarkdown(feedback);
    document.getElementById('review-modal').classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  function closeReviewModal(e) {
    if (e && e.target !== document.getElementById('review-modal')) return;
    document.getElementById('review-modal').classList.remove('visible');
    document.body.style.overflow = '';
  }

  function openAll() {
    filteredReviews.filter(r => r.reviewStatus !== "failed").forEach(r => window.open(r.url, "_blank"));
  }

  function prStatusBadge(status) {
    if (!status || status === "open") return "";
    if (status === "merged") return '<span class="badge badge-status-merged">⎇ Merged</span>';
    if (status === "closed") return '<span class="badge badge-status-closed">✕ Closed</span>';
    return "";
  }

  function reviewStateBadge(state) {
    const map = {
      PENDING:           ["badge-state-pending",   "● Pending"],
      COMMENTED:         ["badge-state-commented", "● Commented"],
      CHANGES_REQUESTED: ["badge-state-changes",   "● Changes requested"],
      APPROVED:          ["badge-state-approved",  "✓ Approved"],
    };
    const [cls, label] = map[state] || map["PENDING"];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function renderMarkdown(raw) {
    // Escape HTML first to prevent XSS, then apply markdown on top
    const escaped = String(raw)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

    return escaped
      // Fenced code blocks (preserve content, undo escaping inside)
      .replace(/```([\w]*)?\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.trim()}</code></pre>`)
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Tables (must come before other block elements)
      .replace(/^\|(.+)\|$/gm, (row) => {
        const cells = row.split("|").slice(1, -1).map(c => c.trim());
        return "<tr>" + cells.map(cell =>
          /^[-:]+$/.test(cell) ? "" : `<td>${cell}</td>`
        ).filter(Boolean).join("") + "</tr>";
      })
      .replace(/(<tr>.*<\/tr>\n?)+/gs, (table) => {
        const rows = table.trim().split("\n");
        const header = rows[0].replace(/<td>/g, "<th>").replace(/<\/td>/g, "</th>");
        const body = rows.slice(2).join("\n");
        return `<table><thead>${header}</thead><tbody>${body}</tbody></table>`;
      })
      // Headings
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      // Bold + italic
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      // Bold
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Horizontal rule
      .replace(/^---$/gm, '<hr>')
      // Unordered lists
      .replace(/((?:^[ \t]*[-*] .+\n?)+)/gm, (block) => {
        const items = block.trim().split("\n").map(line =>
          `<li>${line.replace(/^[ \t]*[-*] /, "")}</li>`
        ).join("");
        return `<ul>${items}</ul>`;
      })
      // Paragraphs
      .replace(/\n\n+/g, '</p><p>')
      .replace(/^(?!<[a-z])(.+)$/gm, (line) => line)
      .replace(/^(.+)$\n(?=<ul>|<pre>|<h[1-6]>|<hr>|<table>)/gm, '$1')
      // Wrap in paragraph tags if not already a block element
      .replace(/^(?!<(?:h[1-6]|ul|ol|li|pre|hr|table|thead|tbody|tr|th|td|p))(.+)$/gm, '<p>$1</p>');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function openInClaude(btn) {
    const id = btn.getAttribute("data-id");
    const original = btn.textContent;
    btn.textContent = "Opening...";
    btn.disabled = true;
    try {
      const res = await fetch(`/api/open-in-claude/${encodeURIComponent(id)}`);
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || `HTTP ${res.status}`);
      }
      btn.textContent = "✓ Opened";
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
    } catch (err) {
      btn.textContent = original;
      btn.disabled = false;
      showError(`Could not open in Claude Code: ${err.message}`);
    }
  }

  async function viewLog(btn) {
    const id    = btn.getAttribute("data-id");
    const title = btn.getAttribute("data-title");
    const modal = document.getElementById("log-modal");
    document.body.style.overflow = 'hidden';
    const content = document.getElementById("log-content");
    document.getElementById("log-modal-title").textContent = `Log — ${title}`;
    content.innerHTML = '<span class="log-loading">Loading log...</span>';
    modal.classList.add("visible");

    try {
      const res = await fetch(`/api/logs/${encodeURIComponent(id)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      content.textContent = text;
    } catch (err) {
      content.innerHTML = `<span class="log-loading">Failed to load log: ${err.message}</span>`;
    }
  }

  function closeLogModal(e) {
    if (e && e.target !== document.getElementById("log-modal")) return;
    document.getElementById("log-modal").classList.remove("visible");
    document.body.style.overflow = '';
  }

  async function dismissReview(btn) {
    const id   = btn.getAttribute("data-id");
    const i    = btn.getAttribute("data-idx");
    const card = document.getElementById(`card-${i}`);
    card.classList.add("removing");
    try {
      const res = await fetch(`/api/reviews/${encodeURIComponent(id)}`, { method: "DELETE" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      reviews = reviews.filter(r => r.id !== id);
      setTimeout(() => { applyControls(); }, 220);
    } catch (err) {
      card.classList.remove("removing");
      showError(`Could not dismiss review: ${err.message}`);
    }
  }

  function confirmClearAll() {
    document.getElementById("confirm-banner").classList.add("visible");
  }

  function cancelClearAll() {
    document.getElementById("confirm-banner").classList.remove("visible");
  }

  async function clearAll() {
    cancelClearAll();
    try {
      const res = await fetch("/api/reviews", { method: "DELETE" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      reviews = [];
      applyControls();
    } catch (err) {
      showError(`Could not clear reviews: ${err.message}`);
    }
  }

  function showError(msg) {
    const banner = document.getElementById("error-banner");
    banner.style.display = "";
    banner.textContent = msg;
    setTimeout(() => { banner.style.display = "none"; }, 5000);
  }

  let currentCommitsId = null;

  function closeCommitsModal() {
    document.getElementById('commits-modal').classList.remove('visible');
    document.body.style.overflow = '';
    currentCommitsId = null;
  }

  async function markSeenFromModal() {
    if (!currentCommitsId) return;
    try {
      await fetch(`/api/reviews/${encodeURIComponent(currentCommitsId)}/mark-seen`, { method: "POST" });
      closeCommitsModal();
      await loadReviews();
    } catch (err) {
      showError(`Could not mark as seen: ${err.message}`);
    }
  }

  function showCommitsFromBadge(badge) {
    const id      = badge.getAttribute('data-id');
    const commits = JSON.parse(badge.getAttribute('data-commits') || '[]');
    showCommits(id, commits);
  }

  function showCommits(id, commits) {
    currentCommitsId = id;
    document.body.style.overflow = 'hidden';
    document.getElementById('commits-modal-title').textContent =
      `${commits.length} new commit${commits.length !== 1 ? 's' : ''} since your last review`;
    document.getElementById('commits-modal-body').innerHTML = commits.map(c => `
      <div class="commit-item">
        <span class="commit-sha">${escHtml(c.sha)}</span>
        <span class="commit-msg">${escHtml(c.message)}</span>
        <span class="commit-author">${escHtml(c.author)}</span>
      </div>
    `).join('');
    document.getElementById('commits-modal').classList.add('visible');
  }

  // Close commits modal on overlay click
  document.getElementById('commits-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('commits-modal')) closeCommitsModal();
  });

  let firstLoad = true;

  const MOCK_MODE = new URLSearchParams(location.search).has("mock");

  async function loadReviews(callRefresh = false) {
    if (MOCK_MODE) {
      const raw = mockReviews();
      reviews = [
        ...raw.filter(r => !r.prStatus || r.prStatus === "open"),
        ...raw.filter(r => r.prStatus && r.prStatus !== "open"),
      ];
      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("summary-bar").style.display = "";
      document.getElementById("cards").style.display = "";
      firstLoad = false;
      populateRepoFilter();
      applyControls();
      document.getElementById("refreshed-at").textContent = "Mock data — design preview";
      return;
    }
    document.getElementById("error-banner").style.display = "none";
    if (callRefresh && firstLoad) {
      document.getElementById("loading-screen").style.display = "";
      document.getElementById("summary-bar").style.display = "none";
      document.getElementById("cards").style.display = "none";
      document.getElementById("controls-bar").style.display = "none";
    }
    if (callRefresh) {
      try { await fetch('/api/refresh', { method: 'POST' }); } catch { /* best effort */ }
    }
    try {
      const res = await fetch("/results/reviews.json?nocache=" + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw = await res.json();
      // open first, then merged/closed
      reviews = [
        ...raw.filter(r => !r.prStatus || r.prStatus === "open"),
        ...raw.filter(r => r.prStatus && r.prStatus !== "open"),
      ];
      if (firstLoad) {
        document.getElementById("loading-screen").style.display = "none";
        document.getElementById("summary-bar").style.display = "";
        document.getElementById("cards").style.display = "";
      }
      firstLoad = false;
      const scrollY = window.scrollY;
      populateRepoFilter();
      applyControls();
      window.scrollTo(0, scrollY);
      document.getElementById("refreshed-at").textContent =
        "Last refreshed: " + new Date().toLocaleTimeString();
    } catch (err) {
      showError(`Could not load reviews.json: ${err.message}. Make sure server.ts is running.`);
      document.getElementById("cards").innerHTML = "";
      document.getElementById("summary-bar").innerHTML = "";
    }
  }

  loadReviews(true);
  setInterval(() => loadReviews(true), 60000);
</script>
