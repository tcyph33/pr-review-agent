<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Review Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 6px #3fb950;
    }

    .meta { font-size: 0.8rem; color: #8b949e; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 16px;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary   { background: #238636; color: #fff; }
    .btn-danger    { background: #3d1c1c; color: #f85149; border: 1px solid #6e2020; }
    .btn-ghost     { background: transparent; color: #8b949e; border: 1px solid #30363d; font-size: 0.75rem; padding: 6px 12px; }
    .btn-dismiss   { background: transparent; color: #6e7681; border: 1px solid #30363d; font-size: 0.72rem; padding: 4px 10px; border-radius: 6px; }
    .btn-dismiss:hover { color: #f85149; border-color: #6e2020; background: #1a0d0d; }
    .btn-claude    { background: transparent; color: #a78bfa; border: 1px solid #4a2d8a; font-size: 0.72rem; padding: 4px 10px; border-radius: 6px; }
    .btn-claude:hover { background: #1e1030; }
    .btn-log       { background: transparent; color: #e3b341; border: 1px solid #5a3800; font-size: 0.72rem; padding: 4px 10px; border-radius: 6px; }
    .btn-log:hover { background: #1a1000; }

    .summary-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }

    .stat {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 18px;
      min-width: 110px;
    }

    .stat-value { font-size: 1.5rem; font-weight: 700; color: #f0f6fc; }
    .stat-label { font-size: 0.72rem; color: #8b949e; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-warn .stat-value { color: #e3b341; }

    .cards { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s, opacity 0.3s;
    }

    .card:hover { border-color: #58a6ff; }
    .card.removing { opacity: 0; transform: scale(0.98); transition: opacity 0.2s, transform 0.2s; }
    .card-failed { border-color: #6e2020 !important; }
    .card-failed:hover { border-color: #f85149 !important; }
    .card-merged { opacity: 0.6; }
    .card-closed { opacity: 0.6; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 20px 12px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .card-title { font-size: 1rem; font-weight: 600; color: #58a6ff; text-decoration: none; line-height: 1.4; }
    .card-title:hover { text-decoration: underline; }
    .card-title-failed { color: #f85149; }

    .card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; align-items: center; }

    .badge { font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .badge-repo   { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .badge-author { background: #1f2d3d; color: #58a6ff; }
    .badge-files  { background: #1a2a1a; color: #3fb950; }
    .badge-add    { background: #1a2a1a; color: #3fb950; }
    .badge-del    { background: #2a1a1a; color: #f85149; }
    .badge-time   { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .badge-failed { background: #3d1c1c; color: #f85149; border: 1px solid #6e2020; }
    .badge-state-pending   { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .badge-state-commented { background: #1f2d3d; color: #58a6ff; border: 1px solid #1f4070; }
    .badge-state-changes   { background: #2a1a0a; color: #e3b341; border: 1px solid #5a3800; }
    .badge-state-approved  { background: #1a2a1a; color: #3fb950; border: 1px solid #1a4a1a; }
    .badge-status-open   { display: none; }
    .badge-status-merged { background: #2d1f4a; color: #a78bfa; border: 1px solid #4a2d8a; }
    .badge-status-closed { background: #21262d; color: #8b949e; border: 1px solid #30363d; }

    .card-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

    .card-body { border-top: 1px solid #21262d; padding: 16px 20px; }

    .failed-message {
      font-size: 0.875rem;
      color: #8b949e;
      font-style: italic;
    }

    .feedback {
      font-size: 0.875rem;
      line-height: 1.65;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .feedback.expanded { max-height: none; }
    .feedback-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #8b949e; margin-bottom: 10px; font-weight: 600; }
    .feedback::-webkit-scrollbar { width: 4px; }
    .feedback::-webkit-scrollbar-track { background: transparent; }
    .feedback::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .card-footer { padding: 10px 20px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #21262d; }

    .empty { text-align: center; padding: 80px 24px; color: #8b949e; }
    .empty h2 { font-size: 1.1rem; margin-bottom: 8px; color: #c9d1d9; }
    .empty p  { font-size: 0.85rem; }

    .error-banner {
      background: #2a1a1a;
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 14px 18px;
      color: #f85149;
      font-size: 0.85rem;
      margin-bottom: 24px;
      display: none;
    }

    .confirm-banner {
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.85rem;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .confirm-banner.visible { display: flex; }
    .confirm-banner span { color: #c9d1d9; }
    .confirm-banner .confirm-actions { display: flex; gap: 8px; }

    /* ── Log modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      width: 100%;
      max-width: 860px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #21262d;
    }

    .modal-title { font-size: 0.9rem; font-weight: 600; color: #f0f6fc; }
    .modal-close { background: transparent; border: none; color: #8b949e; font-size: 1.2rem; cursor: pointer; padding: 0 4px; }
    .modal-close:hover { color: #f0f6fc; opacity: 1; }

    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }

    .log-content {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-loading { color: #8b949e; font-style: italic; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <div>
    <h1><span class="dot"></span> PR Review Dashboard</h1>
    <div class="meta" id="refreshed-at"></div>
  </div>
  <div class="actions">
    <button class="btn-ghost" onclick="loadReviews()">↺ Refresh</button>
    <button class="btn-danger" id="btn-clear-all" onclick="confirmClearAll()" style="display:none">Clear All</button>
    <button class="btn-primary" id="btn-open-all" onclick="openAll()" style="display:none">Open All</button>
  </div>
</header>

<div class="error-banner" id="error-banner"></div>

<div class="confirm-banner" id="confirm-banner">
  <span>Remove all reviews? This cannot be undone.</span>
  <div class="confirm-actions">
    <button class="btn-ghost" onclick="cancelClearAll()">Cancel</button>
    <button class="btn-danger" onclick="clearAll()">Yes, clear all</button>
  </div>
</div>

<div class="summary-bar" id="summary-bar"></div>
<div class="cards" id="cards"></div>

<!-- Log modal -->
<div class="modal-overlay" id="log-modal" onclick="closeLogModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="log-modal-title">Agent Log</div>
      <button class="modal-close" onclick="closeLogModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="log-content" id="log-content"></div>
    </div>
  </div>
</div>

<script>
  let reviews = [];

  function timeAgo(isoString) {
    const diff = Date.now() - new Date(isoString).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1)  return "just now";
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function prAgeDays(r) {
    const created = r.prCreatedAt ? new Date(r.prCreatedAt) : new Date(r.reviewedAt);
    return Math.floor((Date.now() - created.getTime()) / 86400000);
  }

  function renderSummary() {
    const bar    = document.getElementById("summary-bar");
    const open   = reviews.filter(r => !r.prStatus || r.prStatus === "open");
    const repos  = new Set(open.map(r => r.repo)).size;
    const ages   = open.map(r => prAgeDays(r));
    const oldest = ages.length ? Math.max(...ages) : 0;
    const avg    = ages.length ? Math.round(ages.reduce((s,a) => s+a, 0) / ages.length) : 0;
    bar.innerHTML = `
      <div class="stat"><div class="stat-value">${open.length}</div><div class="stat-label">PRs Pending</div></div>
      <div class="stat"><div class="stat-value">${repos}</div><div class="stat-label">Repos</div></div>
      <div class="stat ${oldest >= 7 ? 'stat-warn' : ''}"><div class="stat-value">${oldest === 1 ? '1 day' : oldest + ' days'}</div><div class="stat-label">Oldest PR</div></div>
      <div class="stat"><div class="stat-value">${avg === 1 ? '1 day' : avg + ' days'}</div><div class="stat-label">Avg PR Age</div></div>
    `;
  }

  function renderCards() {
    const container = document.getElementById("cards");
    const hasReviews = reviews.length > 0;

    document.getElementById("btn-open-all").style.display  = hasReviews ? "" : "none";
    document.getElementById("btn-clear-all").style.display = hasReviews ? "" : "none";

    if (!hasReviews) {
      container.innerHTML = `
        <div class="empty">
          <h2>No reviews yet</h2>
          <p>Run <code>npm run review</code> to fetch and review open PRs.</p>
        </div>`;
      return;
    }

    container.innerHTML = reviews.map((r, i) => {
      const failed = r.reviewStatus === "failed";
      const cardClass = [
        "card",
        failed ? "card-failed" : "",
        r.prStatus === "merged" ? "card-merged" : "",
        r.prStatus === "closed" ? "card-closed" : "",
      ].filter(Boolean).join(" ");

      const titleClass = failed ? "card-title card-title-failed" : "card-title";

      const metaBadges = failed
        ? `<span class="badge badge-repo">${escHtml(r.repo)}</span>
           <span class="badge badge-author">@${escHtml(r.author)}</span>
           <span class="badge badge-time">${timeAgo(r.reviewedAt)}</span>
           <span class="badge badge-failed">⚠ Review Failed</span>`
        : `<span class="badge badge-repo">${escHtml(r.repo)}</span>
           <span class="badge badge-author">@${escHtml(r.author)}</span>
           <span class="badge badge-files">${r.filesChanged} file${r.filesChanged !== 1 ? "s" : ""}</span>
           <span class="badge badge-add">+${r.additions}</span>
           <span class="badge badge-del">-${r.deletions}</span>
           <span class="badge badge-time">${prAgeDays(r) === 1 ? '1 day old' : prAgeDays(r) + ' days old'}</span>
           ${reviewStateBadge(r.reviewState || "PENDING")}
           ${prStatusBadge(r.prStatus)}`;

      const cardBody = failed
        ? `<div class="card-body">
             <p class="failed-message">The review agent failed for this PR. Check the log for details.</p>
           </div>`
        : `<div class="card-body">
             <div class="feedback-label">Agent Feedback</div>
             <div class="feedback" id="feedback-${i}">${escHtml(r.feedback)}</div>
           </div>`;

      const cardFooter = failed
        ? ``
        : `<div class="card-footer">
             <button class="btn-ghost" onclick="toggleExpand(${i}, this)">Expand</button>
           </div>`;

      return `
        <div class="${cardClass}" id="card-${i}">
          <div class="card-header">
            <div>
              <a class="${titleClass}" href="${r.url}" target="_blank">${escHtml(r.title)}</a>
              <div class="card-meta">${metaBadges}</div>
            </div>
            <div class="card-actions">
              ${!failed ? `<a href="${r.url}" target="_blank"><button class="btn-ghost">Open PR ↗</button></a>` : ""}
              ${!failed ? `<button class="btn-claude" onclick="openInClaude('${escHtml(r.id)}')">⬡ Claude Code</button>` : ""}
              ${r.logFile ? `<button class="btn-log" onclick="viewLog('${escHtml(r.id)}', '${escHtml(r.title)}')">View Log</button>` : ""}
              <button class="btn-dismiss" onclick="dismissReview('${escHtml(r.id)}', ${i})">✕ Dismiss</button>
            </div>
          </div>
          ${cardBody}
          ${cardFooter}
        </div>
      `;
    }).join("");
  }

  function toggleExpand(i, btn) {
    const el = document.getElementById(`feedback-${i}`);
    const expanded = el.classList.toggle("expanded");
    btn.textContent = expanded ? "Collapse" : "Expand";
  }

  function openAll() {
    reviews.filter(r => r.reviewStatus !== "failed").forEach(r => window.open(r.url, "_blank"));
  }

  function prStatusBadge(status) {
    if (!status || status === "open") return "";
    if (status === "merged") return '<span class="badge badge-status-merged">⎇ Merged</span>';
    if (status === "closed") return '<span class="badge badge-status-closed">✕ Closed</span>';
    return "";
  }

  function reviewStateBadge(state) {
    const map = {
      PENDING:           ["badge-state-pending",   "● Pending"],
      COMMENTED:         ["badge-state-commented", "● Commented"],
      CHANGES_REQUESTED: ["badge-state-changes",   "● Changes requested"],
      APPROVED:          ["badge-state-approved",  "✓ Approved"],
    };
    const [cls, label] = map[state] || map["PENDING"];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function openInClaude(id) {
    try {
      const res = await fetch(`/api/open-in-claude/${encodeURIComponent(id)}`);
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || `HTTP ${res.status}`);
      }
    } catch (err) {
      showError(`Could not open in Claude Code: ${err.message}`);
    }
  }

  async function viewLog(id, title) {
    const modal = document.getElementById("log-modal");
    const content = document.getElementById("log-content");
    document.getElementById("log-modal-title").textContent = `Log — ${title}`;
    content.innerHTML = '<span class="log-loading">Loading log...</span>';
    modal.classList.add("visible");

    try {
      const res = await fetch(`/api/logs/${encodeURIComponent(id)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      content.textContent = text;
    } catch (err) {
      content.innerHTML = `<span class="log-loading">Failed to load log: ${err.message}</span>`;
    }
  }

  function closeLogModal(e) {
    if (e && e.target !== document.getElementById("log-modal")) return;
    document.getElementById("log-modal").classList.remove("visible");
  }

  async function dismissReview(id, i) {
    const card = document.getElementById(`card-${i}`);
    card.classList.add("removing");
    try {
      const res = await fetch(`/api/reviews/${encodeURIComponent(id)}`, { method: "DELETE" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      reviews = reviews.filter(r => r.id !== id);
      setTimeout(() => { renderSummary(); renderCards(); }, 220);
    } catch (err) {
      card.classList.remove("removing");
      showError(`Could not dismiss review: ${err.message}`);
    }
  }

  function confirmClearAll() {
    document.getElementById("confirm-banner").classList.add("visible");
  }

  function cancelClearAll() {
    document.getElementById("confirm-banner").classList.remove("visible");
  }

  async function clearAll() {
    cancelClearAll();
    try {
      const res = await fetch("/api/reviews", { method: "DELETE" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      reviews = [];
      renderSummary();
      renderCards();
    } catch (err) {
      showError(`Could not clear reviews: ${err.message}`);
    }
  }

  function showError(msg) {
    const banner = document.getElementById("error-banner");
    banner.style.display = "";
    banner.textContent = msg;
    setTimeout(() => { banner.style.display = "none"; }, 5000);
  }

  async function loadReviews() {
    document.getElementById("error-banner").style.display = "none";
    try {
      const res = await fetch("/results/reviews.json?nocache=" + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw = await res.json();
      // open first, then merged/closed
      reviews = [
        ...raw.filter(r => !r.prStatus || r.prStatus === "open"),
        ...raw.filter(r => r.prStatus && r.prStatus !== "open"),
      ];
      renderSummary();
      renderCards();
      document.getElementById("refreshed-at").textContent =
        "Last refreshed: " + new Date().toLocaleTimeString();
    } catch (err) {
      showError(`Could not load reviews.json: ${err.message}. Make sure server.ts is running.`);
      document.getElementById("cards").innerHTML = "";
      document.getElementById("summary-bar").innerHTML = "";
    }
  }

  loadReviews();
  setInterval(loadReviews, 60000);
</script>
</body>
</html>
